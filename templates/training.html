<!DOCTYPE html>
<html>
<head>
    <title>Cyber Training</title>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 500px;
        }

        button {
            margin: 10px;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        .correct {
            color: #22c55e;
        }

        .wrong {
            color: #ef4444;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🎯 Cyber Training</h1>

<p>{{ question }}</p>

<form method="POST">
    <button name="answer" value="spam" {% if answered %}disabled{% endif %}>🚫 Spam</button>
    <button name="answer" value="not_spam" {% if answered %}disabled{% endif %}>✅ Not Spam</button>
</form>

<br>

{% if answered %}

    <h2 class="{% if result and 'Correct' in result %}correct{% else %}wrong{% endif %}">
        {{ result }}
    </h2>

    <p>{{ explanation }}</p>

    <h2 id="celebration-text"></h2>

    <!-- NEXT -->
    <form method="POST">
        <button name="action" value="next">Next ➡️</button>
    </form>

    <br>

    <!-- FINISH -->
    <a href="/dashboard">
        <button>🏁 Finish</button>
    </a>

{% endif %}

<p><b>Score:</b> {{ score }}</p>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const resultText = "{{ result if result else '' }}";
        const isCorrect = resultText.includes("Correct");

        if (isCorrect) {
            confetti({
                particleCount: 120,
                spread: 60,
                origin: { y: 0.6 }
            });

            const messages = ["🎉 Yayyy!", "🥳 Woohoo!", "🔥 Awesome!", "💯 Yahoo!", "👏 Great Job!"];
            const msg = messages[Math.floor(Math.random() * messages.length)];

            const el = document.getElementById("celebration-text");
            if (el) {
                el.innerText = msg;
            }
        }
    });
</script>

</body>
</html>
